name: Daily Price Scrape

# Orchestration layer (M3). Runs once daily on GitHub's hosted runner,
# which has open network egress — so it can reach tesco.ie directly.
on:
  schedule:
    - cron: "0 8 * * *"     # 08:00 UTC every day
  workflow_dispatch: {}      # manual "Run workflow" button in the Actions tab

permissions:
  contents: write            # needed to commit the updated data back to the repo

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily scrape + ingest + cube export
        run: python run.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ reports/cube.json
          git diff --staged --quiet || git commit -m "Daily price data: $(date -u +%Y-%m-%d)"
          git push
