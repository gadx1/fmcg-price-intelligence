# Compliance guardrails enforced in code (do not edit casually)
compliance:
  request_delay_seconds: [3, 7]   # randomised human-rate delay range
  max_skus_per_run: 60            # hard cap; refuse to run beyond this
  user_agent: "GadielAnalytics-PriceIntel/0.1 (portfolio research; +github.com/Gadx1)"
  disallowed_path_fragments:      # never request URLs containing these
    - "offset="
    - "/promotions/"
    - "/login"
    - "/register"
