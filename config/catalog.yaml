# =============================================================================
# SKU Catalog — Coca-Cola CSD portfolio @ Tesco Ireland
# =============================================================================
# Add / remove products here WITHOUT touching scraper code.
# 'id' is the stable Tesco product ID found in the URL:
#   https://www.tesco.ie/groceries/en-IE/products/{id}
#
# 'sugar_class' lets us compute the Sugar-Tax spread (full-sugar vs zero/diet),
# which is the signature RGM insight of this project.
# =============================================================================

retailer:
  name: "Tesco Ireland"
  code: "tesco_ie"
  base_url: "https://www.tesco.ie/groceries/en-IE/products"
  currency: "EUR"
  market: "IE"

products:
  # --- Coca-Cola Original (full sugar — subject to IE sugar tax) ---------------
  - id: "315469891"
    brand: "Coca-Cola"
    variant: "Original"
    sugar_class: "full"
    pack: "2L"
    container: "PET"

  - id: "300116791"
    brand: "Coca-Cola"
    variant: "Original"
    sugar_class: "full"
    pack: "20x330ml"
    container: "Can"

  - id: "315848575"
    brand: "Coca-Cola"
    variant: "Original"
    sugar_class: "full"
    pack: "18x330ml"
    container: "Can"

  # --- Placeholders to expand during M1 validation ---------------------------
  # Fill 'id' from the live product URLs for Zero / Diet to activate the
  # Sugar-Tax spread comparison. Left here as documented intent.
  # - id: "TBD"
  #   brand: "Coca-Cola"
  #   variant: "Zero Sugar"
  #   sugar_class: "zero"
  #   pack: "2L"
  #   container: "PET"
  #
  # - id: "TBD"
  #   brand: "Coca-Cola"
  #   variant: "Diet Coke"
  #   sugar_class: "diet"
